<!DOCTYPE html>
<html lang="pt-br" class="bg-gray-100 font-sans text-gray-800 min-h-screen">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AgendeJá</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="assets/imgs/Miniatura.png"/>
</head>
<body class="flex flex-col min-h-screen">
<!-- ============================
   Página de Login
============================== -->
<div
        id="page-login"
        class="flex items-center justify-center flex-1 p-4 bg-gray-100"
>
    <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg">
        <!-- Espaço para sua logo -->
        <div class="flex justify-center mb-8">
            <img src="/assets/imgs/Logo.png" alt="Logo AgendeJá" class="h-20 w-auto"/>
        </div>

        <h2 class="text-2xl font-semibold mb-4 text-center text-blue-600">
            Bem-vindo
        </h2>

        <form class="space-y-4" id="login-form">
            <!-- E-mail -->
            <div>
                <label class="block mb-1 font-medium" for="login-email"
                >E-mail</label
                >
                <input
                        type="email"
                        id="login-email"
                        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                        placeholder="seu@email.com"
                        required
                />
            </div>
            <!-- Senha -->
            <div>
                <label class="block mb-1 font-medium" for="login-senha"
                >Senha</label
                >
                <input
                        type="password"
                        id="login-senha"
                        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                        placeholder="Senha"
                        required
                />
            </div>
            <!-- Botão Entrar -->
            <button
                    type="submit"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded transition"
            >
                Entrar
            </button>
        </form>
        <!-- Links -->
        <div class="mt-4 flex justify-between text-sm">
            <a href="#" id="link-esqueci" class="text-blue-400 hover:underline"
            >Esqueci minha senha</a
            >
            <a href="#" id="link-cadastrar" class="text-blue-400 hover:underline"
            >Cadastre-se</a
            >
        </div>
    </div>
</div>

<!-- ============================
   Página de Cadastro
============================== -->
<div
        id="page-cadastro"
        class="hidden flex items-center justify-center flex-1 p-4 bg-gray-100"
>
    <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg">
        <h2 class="text-2xl font-semibold mb-4 text-center text-blue-600">
            Criar Conta
        </h2>

        <form class="space-y-4" id="cadastro-form">
            <!-- Nome completo -->
            <div>
                <label class="block mb-1 font-medium" for="cadastro-nome"
                >Nome Completo</label
                >
                <input
                        type="text"
                        id="cadastro-nome"
                        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                        placeholder="Seu nome"
                        required
                />
            </div>
            <!-- Tipo de profissional -->

            <div class="flex items-center justify-between">
                <label class="block mb-1 font-medium" for="cliente"
                >Sou um cliente</label>
                <input type="radio" id="cliente" name="tipo-status" value="cliente" onclick="verificarStatus()"/>

                <label class="block mb-1 font-medium" for="profissional"
                >Sou um profissional</label>
                <input type="radio" id="profissional" name="tipo-status" value="profissional" onclick="verificarStatus()" />
            </div>

            <div class="hidden escondidoProfissonais">
                <label class=" block mb-1 font-medium" for="tipo-profissional"
                >Tipo de Profissional</label
                >
                <select
                        id="tipo-profissional"
                        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                        required
                >
                    <option value="">Selecione</option>
                    <option value="Barbeiro">Barbeiro</option>
                    <option value="Professor">Professor</option>
                    <option value="Tatuador">Tatuador</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>
            <!-- E-mail -->
            <div>
                <label class="block mb-1 font-medium" for="cadastro-email"
                >E-mail</label
                >
                <input
                        type="email"
                        id="cadastro-email"
                        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                        placeholder="seu@email.com"
                        required
                />
            </div>
            <!-- Senha -->
            <div>
                <label class="block mb-1 font-medium" for="cadastro-senha"
                >Senha</label
                >
                <input
                        type="password"
                        id="cadastro-senha"
                        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                        placeholder="Senha"
                        required
                />
            </div>
            <!-- Confirmar senha -->
            <div>
                <label class="block mb-1 font-medium" for="cadastro-confirmar"
                >Confirmar Senha</label
                >
                <input
                        type="password"
                        id="cadastro-confirmar"
                        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                        placeholder="Confirmar senha"
                        required
                />
            </div>
            <!-- Botão criar conta -->
            <button
                    type="submit"
                    class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded transition"
            >
                Criar Conta
            </button>
        </form>
        <!-- Link voltar ao login -->
        <div class="mt-4 text-center text-sm">
            <a
                    href="#"
                    id="link-voltar-login"
                    class="text-blue-400 hover:underline"
            >Já tenho uma conta</a
            >
        </div>
    </div>
</div>

<!-- ============================
   Dashboard do Usuário
============================== -->
<div
        id="page-dashboard"
        class="hidden flex-1 flex flex-col md:flex-row bg-gray-100 text-gray-800 min-h-screen"
>
    <!-- Menu lateral -->
    <aside class="w-full md:w-60 bg-white p-4 shadow-md flex-shrink-0">
        <h3 class="text-xl font-semibold mb-4 text-blue-600">Menu</h3>
        <nav class="flex flex-col space-y-3">
            <button
                    class="flex items-center p-2 rounded hover:bg-gray-200"
                    data-section="agenda"
            >
                <svg
                        class="w-5 h-5 mr-2"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                >
                    <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M8 7V3m8 4V3m-9 8h10m-4 4h4m-4 4h4m-4 4h4"
                    />
                </svg>
                Agenda
            </button>
            <button
                    class="flex items-center p-2 rounded hover:bg-gray-200"
                    data-section="clientes"
            >
                <svg
                        class="w-5 h-5 mr-2"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                >
                    <circle
                            cx="12"
                            cy="7"
                            r="4"
                            stroke="currentColor"
                            stroke-width="2"
                            fill="none"
                    />
                    <path
                            stroke="currentColor"
                            stroke-width="2"
                            d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"
                    />
                </svg>
                Clientes
            </button>
            <button
                    class="flex items-center p-2 rounded hover:bg-gray-200"
                    data-section="configuracoes"
            >
                <svg
                        class="w-5 h-5 mr-2"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                >
                    <circle
                            cx="12"
                            cy="12"
                            r="3"
                            stroke="currentColor"
                            stroke-width="2"
                    />
                    <path
                            stroke="currentColor"
                            stroke-width="2"
                            d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.5V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1-1.5 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.5-1H3a2 2 0 010-4h.09a1.65 1.65 0 001 1.5h3.4z"
                    />
                </svg>
                Configurações
            </button>
            <button
                    class="flex items-center p-2 rounded hover:bg-gray-200"
                    id="sair-btn"
            >
                <svg
                        class="w-5 h-5 mr-2"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                >
                    <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H7a2 2 0 01-2-2V7a2 2 0 012-2h4a2 2 0 012 2v1"
                    />
                </svg>
                Sair
            </button>
        </nav>
    </aside>

    <!-- Conteúdo principal -->
    <main class="flex-1 p-6">
        <!-- Saudação -->
        <div class="mb-4">
            <h1 class="text-2xl font-semibold">
                Olá, <span id="nome-profissional">Seu Nome</span>
            </h1>
        </div>

        <!-- Seção Agenda -->
        <section id="section-agenda" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-semibold text-blue-600">Agenda</h2>
                <button
                        class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded"
                        id="btn-novo-agendamento"
                >
                    Novo Agendamento
                </button>
            </div>
            <!-- Calendário (simples) -->
            <div class="bg-blue-100 p-4 rounded shadow-md">
                <p class="text-center text-blue-600">[Calendário aqui]</p>
            </div>
            <!-- Lista de próximos agendamentos -->
            <div>
                <h3 class="text-lg font-semibold mb-2">Próximos Agendamentos</h3>
                <ul id="lista-agendamentos" class="space-y-2">
                    <!-- Itens dinâmicos -->
                    <li class="bg-white p-3 rounded shadow">
                        Sem agendamentos próximos
                    </li>
                </ul>
            </div>
        </section>

        <!-- Seção Clientes -->
        <section id="section-clientes" class="hidden">
            <h2 class="text-xl font-semibold mb-4 text-blue-600">Clientes</h2>
            <p>[Lista de clientes]</p>
        </section>

        <!-- Seção Configurações -->
        <section id="section-configuracoes" class="hidden">
            <h2 class="text-xl font-semibold mb-4 text-blue-600">
                Configurações
            </h2>
            <p>[Opções de configuração]</p>
        </section>
    </main>
</div>

<!-- ============================
   Modal Novo Agendamento
============================== -->
<div
        id="modal-agendamento"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
>
    <div class="bg-white p-6 rounded-lg w-full max-w-md shadow-lg relative">
        <h3 class="text-xl font-semibold mb-4 text-blue-600">
            Novo Agendamento
        </h3>
        <form id="form-agendamento" class="space-y-4">
            <!-- Nome do cliente -->
            <div>
                <label class="block mb-1 font-medium" for="cliente-nome"
                >Nome do Cliente</label
                >
                <input
                        type="text"
                        id="cliente-nome"
                        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                        placeholder="Nome do cliente"
                        required
                />
            </div>
            <!-- Data -->
            <div>
                <label class="block mb-1 font-medium" for="data-agendamento"
                >Data</label
                >
                <input
                        type="date"
                        id="data-agendamento"
                        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                        required
                />
            </div>
            <!-- Horário -->
            <div>
                <label class="block mb-1 font-medium" for="hora-agendamento"
                >Horário</label
                >
                <input
                        type="time"
                        id="hora-agendamento"
                        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                        required
                />
            </div>
            <!-- Serviço -->
            <div>
                <label class="block mb-1 font-medium" for="servico">Serviço</label>
                <select
                        id="servico"
                        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                        required
                >
                    <option value="">Selecione</option>
                    <option value="Corte de cabelo">Corte de cabelo</option>
                    <option value="Tatuagem">Tatuagem</option>
                    <option value="Barba">Barba</option>
                    <!-- Outros serviços -->
                </select>
            </div>
            <!-- Botões -->
            <div class="flex justify-end space-x-2">
                <button
                        type="button"
                        id="btn-cancelar"
                        class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400"
                >
                    Cancelar
                </button>
                <button
                        type="submit"
                        class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded"
                >
                    Salvar
                </button>
            </div>
        </form>
    </div>
</div>
<script src="assets/js/login.js"></script>
</body>
</html>
